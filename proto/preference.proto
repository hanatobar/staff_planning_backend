syntax = "proto3";

package preference;

service PreferenceService {

  rpc AddPreference (AddPreferenceRequest) returns (PreferenceResponse);

  rpc GetPreferencesByStaff (StaffRequest) returns (PreferenceList);

  rpc GetAllPreferences (EmptyRequest) returns (PreferenceList);

  rpc UpdatePreference (UpdatePreferenceRequest) returns (PreferenceResponse);
  rpc ResetPreferences (StaffRequest) returns (PreferenceResponse);
}


message AddPreferenceRequest {
  int32 staff_id = 1;
  int32 course_id = 2;
  int32 preference_level = 3;
}

message UpdatePreferenceRequest {
  int32 id = 1;
  int32 preference_level = 2;
}

message StaffRequest {
  int32 staff_id = 1;
}

message PreferenceResponse {
  string message = 1;
}

message Preference {
  int32 id = 1;
  int32 staff_id = 2;
  int32 course_id = 3;
  int32 preference_level = 4;
  string staff_name = 5;
  string course_name = 6;
}

message PreferenceList {
  repeated Preference preferences = 1;
}
message EmptyRequest {}
