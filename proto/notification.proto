syntax = "proto3";

package notification;

service NotificationService {
  rpc GetNotificationsByUser (UserRequest) returns (NotificationList);
  rpc GetUnreadCount (UserRequest) returns (UnreadCountResponse);
  rpc MarkNotificationAsRead (NotificationIdRequest) returns (Response);
  rpc MarkAllNotificationsAsRead (UserRequest) returns (Response);

  rpc SendNotificationToAllTAs (CoordinatorNoticeRequest) returns (Response);
  rpc SendNotificationToOneUser (SingleNoticeRequest) returns (Response);
  rpc SendNotificationToSelectedUsers (MultiNoticeRequest) returns (Response);
}

message UserRequest{
    int32 userId = 1;
}


message NotificationIdRequest {
  int32 notificationId = 1;
}

message Notification {
  int32 id = 1;
  int32 recipientUserId = 2;
  string title = 3;
  string body = 4;
  string type = 5;
  bool isRead = 6;
  string createdAt = 7;
  int32 roundId = 8;
  int32 assignmentId = 9;
}

message NotificationList {
  repeated Notification notifications = 1;
}

message UnreadCountResponse {
  int32 count = 1;
}

message CoordinatorNoticeRequest {
  string title = 1;
  string body = 2;
}

message SingleNoticeRequest {
  int32 userId = 1;
  string title = 2;
  string body = 3;
}

message MultiNoticeRequest {
  repeated int32 userIds = 1;
  string title = 2;
  string body = 3;
}

message Response {
  string message = 1;
}